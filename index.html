<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Nunito+Sans:wght@400;600;700&display=swap');

  :root {
    --vino: #5C0A0A;
    --vino-medio: #771515;
    --vino-card: #6a1111;
    --vino-oscuro: #3a0606;
    --oro: #E8C04B;
    --oro-suave: #f0d488;
    --hueso: #F5EFE6;
    --hueso-tenue: #f5efe6b3;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }

  body {
    background:
      radial-gradient(1200px 800px at 50% -10%, #6e1010 0%, transparent 60%),
      var(--vino);
    color: var(--hueso);
    font-family: 'Nunito Sans', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 18px;
    overflow-x: hidden;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle at 50% 42%, #ffffff0d 0 2px, transparent 3px);
    background-size: 26px 26px;
    opacity: .35;
    pointer-events: none;
    z-index: 0;
  }

  .stage {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 560px;
    text-align: center;
  }

  .eyebrow {
    font-size: 12px;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: var(--oro);
    font-weight: 700;
    margin-bottom: 14px;
  }

  h1, h2, .display {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 900;
    line-height: 1.04;
    letter-spacing: -.01em;
  }

  .chain { display: flex; gap: 6px; align-items: center; margin-bottom: 26px; }
  .link {
    flex: 1; height: 8px; border-radius: 20px; background: #ffffff1f;
    transition: background .45s ease, box-shadow .45s ease;
  }
  .link.broken {
    background: linear-gradient(90deg, var(--oro), var(--oro-suave));
    box-shadow: 0 0 12px #e8c04b6b;
  }

  .card { animation: rise .5s cubic-bezier(.2,.7,.2,1) both; }
  @keyframes rise {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .crest { width: 72px; height: 72px; margin: 0 auto 18px; display: block; }
  .crest-img {
    width: 84px; height: 84px; margin: 0 auto 18px; display: block;
    object-fit: contain;
  }
  .intro h1 { font-size: clamp(34px, 9vw, 52px); margin-bottom: 6px; }
  .intro .sub {
    font-size: 17px; color: var(--hueso-tenue);
    max-width: 38ch; margin: 16px auto 4px; line-height: 1.5;
  }
  .lema {
    font-family: 'Fraunces', serif; font-style: italic; font-weight: 600;
    color: var(--oro); font-size: 18px; margin: 20px 0 26px;
  }

  .photo-strip {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 4px 0 24px;
  }
  .photo-strip .ph {
    aspect-ratio: 1 / 1; border-radius: 14px;
    background: #ffffff14 center/cover no-repeat; border: 1px solid #ffffff1a;
    display: grid; place-items: center;
    color: #f5efe659; font-size: 11px; font-weight: 700;
    letter-spacing: .04em; text-align: center; padding: 6px;
  }

  .btn {
    appearance: none; border: none; cursor: pointer; font-family: inherit;
    font-weight: 700; border-radius: 14px;
    transition: transform .12s ease, box-shadow .2s ease, background .2s ease;
  }
  .btn:active { transform: scale(.98); }
  .btn-primary {
    background: var(--oro); color: var(--vino-oscuro); font-size: 17px;
    padding: 15px 30px; box-shadow: 0 8px 22px #e8c04b3d; letter-spacing: .01em;
  }
  .btn-primary:hover { box-shadow: 0 10px 28px #e8c04b5c; transform: translateY(-1px); }
  .btn-ghost {
    background: transparent; color: var(--hueso-tenue);
    border: 1px solid #ffffff33; padding: 12px 22px; font-size: 14px; font-weight: 600;
  }
  .btn-ghost:hover { color: var(--hueso); border-color: #ffffff66; }

  .music {
    position: fixed; top: 14px; right: 14px; z-index: 4;
    width: 42px; height: 42px; border-radius: 50%;
    background: #ffffff14; border: 1px solid #ffffff2e;
    display: grid; place-items: center; cursor: pointer;
    color: var(--oro); transition: background .2s ease;
  }
  .music:hover { background: #ffffff24; }
  .music svg { width: 20px; height: 20px; }
  .music[hidden] { display: none; }

  .qcount {
    font-size: 13px; color: var(--oro); font-weight: 700;
    letter-spacing: .04em; margin-bottom: 10px;
  }
  .question { font-size: clamp(22px, 5.6vw, 28px); margin-bottom: 24px; line-height: 1.18; }
  .options { display: flex; flex-direction: column; gap: 11px; }
  .opt {
    text-align: left; background: var(--vino-card); color: var(--hueso);
    border: 1px solid #ffffff14; border-radius: 16px; padding: 16px 18px;
    font-size: 16px; font-weight: 600; line-height: 1.35; cursor: pointer;
    transition: border-color .15s ease, background .15s ease, transform .12s ease; width: 100%;
  }
  .opt:hover { border-color: var(--oro); background: #7a1818; }
  .opt:active { transform: scale(.99); }
  .opt:focus-visible { outline: 3px solid var(--oro); outline-offset: 2px; }

  .back {
    margin-top: 20px; background: none; border: none; color: var(--hueso-tenue);
    font-family: inherit; font-size: 14px; cursor: pointer; padding: 6px 2px;
  }
  .back:hover { color: var(--oro); }
  .back[hidden] { display: none; }

  .sello {
    width: 116px; height: 116px; margin: 0 auto 4px; display: grid; place-items: center;
    border-radius: 50%; border: 2px solid var(--oro);
    background: radial-gradient(circle at 50% 35%, #8a1c1c, #4d0808);
    box-shadow: 0 0 0 6px #e8c04b1f, 0 14px 40px #00000059;
    animation: stamp .6s cubic-bezier(.2,1.3,.4,1) both; overflow: hidden;
  }
  @keyframes stamp {
    0% { opacity: 0; transform: scale(1.4) rotate(-8deg); }
    100% { opacity: 1; transform: scale(1) rotate(0); }
  }
  .sello svg { width: 60px; height: 60px; }
  .sello img { width: 100%; height: 100%; object-fit: cover; }

  .result-photo {
    width: 100%; aspect-ratio: 16 / 10; border-radius: 18px; margin: 18px 0 4px;
    background: #ffffff14 center/cover no-repeat; border: 1px solid #ffffff1f;
    display: grid; place-items: center; color: #f5efe659; font-size: 12px;
    font-weight: 700; letter-spacing: .04em; text-align: center; padding: 10px;
    overflow: hidden;
  }
  .result-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .ledein {
    font-size: 14px; color: var(--hueso-tenue); letter-spacing: .04em; margin: 20px 0 6px;
  }
  .result h2 { font-size: clamp(30px, 8vw, 44px); color: var(--oro); margin-bottom: 14px; }
  .mision {
    font-size: 17px; line-height: 1.55; color: var(--hueso);
    max-width: 40ch; margin: 0 auto 20px;
  }
  .porque {
    background: #ffffff0f; border-left: 3px solid var(--oro); border-radius: 10px;
    text-align: left; padding: 16px 18px; margin: 0 auto 16px;
    font-size: 15px; line-height: 1.5;
  }
  .porque b { color: var(--oro-suave); }
  .segundo { font-size: 14px; color: var(--hueso-tenue); margin-bottom: 24px; }
  .segundo b { color: var(--hueso); }

  .actions { display: flex; flex-direction: column; gap: 11px; align-items: center; }
  .actions .btn { width: 100%; max-width: 320px; }

  /* zona que se convierte en imagen al compartir */
  .capture {
    padding: 22px 18px 18px;
    border-radius: 20px;
    background: radial-gradient(circle at 50% 12%, #741414, #4d0808);
    border: 1px solid #ffffff14;
    margin-bottom: 18px;
  }
  .cap-lema {
    font-family: 'Fraunces', serif; font-style: italic; font-weight: 600;
    color: var(--oro); font-size: 16px; margin-top: 14px;
  }
  .cap-tag {
    font-size: 12px; letter-spacing: .18em; text-transform: uppercase;
    color: #f5efe673; font-weight: 700; margin-top: 6px;
  }

  .btn-wa {
    background: #1faf54; color: #ffffff; font-size: 16px; padding: 14px 28px;
    box-shadow: 0 8px 22px #1faf543d;
  }
  .btn-wa:hover { background: #1bbf5b; transform: translateY(-1px); }
  .btn:disabled { opacity: .6; cursor: default; transform: none; }

  .coord { margin-top: 24px; font-size: 13px; color: #f5efe680; line-height: 1.5; }
  .coord b { color: var(--hueso-tenue); }

  .toast {
    position: fixed; left: 50%; bottom: 26px;
    transform: translateX(-50%) translateY(20px);
    background: var(--oro); color: var(--vino-oscuro); font-weight: 700; font-size: 14px;
    padding: 12px 20px; border-radius: 30px; box-shadow: 0 10px 30px #00000066;
    opacity: 0; pointer-events: none;
    transition: opacity .25s ease, transform .25s ease; z-index: 5;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (prefers-reduced-motion: reduce) {
    *, *::before { animation: none !important; transition: none !important; }
  }
</style>

let step = -1;
let scores = { p:0, f:0, l:0, m:0, n:0 };
let answers = [];
let resumeAvailable = false;
const app = document.getElementById('app');
const chainEl = document.getElementById('chain');
const KEYMAP = { p:'promocion', f:'formacion', l:'liturgia', m:'musica', n:'finanzas' };
const STORE_KEY = 'jacm_test_v1';

// ---- persistencia (localStorage con fallback seguro) ----
// Nota: localStorage está bloqueado dentro del visor de artifacts de Claude,
// pero funciona normalmente al subir el archivo a tu hosting.
function saveProgress() {
  try {
    localStorage.setItem(STORE_KEY, JSON.stringify({ step, scores, answers }));
  } catch (e) { /* almacenamiento no disponible: seguimos sin guardar */ }
}
function loadProgress() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (!raw) return null;
    const data = JSON.parse(raw);
    if (typeof data.step === 'number' && Array.isArray(data.answers)) return data;
    return null;
  } catch (e) { return null; }
}
function clearProgress() {
  try { localStorage.removeItem(STORE_KEY); } catch (e) { /* noop */ }
}

let audioEl = null, playing = false;
const musicBtn = document.getElementById('musicBtn');
const ICON_PLAY = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
const ICON_PAUSE = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>';
function setupAudio() {
  if (!CONFIG.audio) return;
  audioEl = new Audio(CONFIG.audio);
  audioEl.loop = true;
  audioEl.volume = 0.4;
  musicBtn.hidden = false;
  musicBtn.innerHTML = ICON_PLAY;
  musicBtn.onclick = () => {
    if (playing) { audioEl.pause(); musicBtn.innerHTML = ICON_PLAY; }
    else { audioEl.play().catch(()=>{}); musicBtn.innerHTML = ICON_PAUSE; }
    playing = !playing;
  };
}

function buildChain() {
  chainEl.innerHTML = '';
  for (let i = 0; i < QUESTIONS.length; i++) {
    const l = document.createElement('div');
    l.className = 'link';
    chainEl.appendChild(l);
  }
}
function updateChain() {
  [...chainEl.children].forEach((l, i) => l.classList.toggle('broken', i < step));
}

  const crest = CONFIG.logoAC
    ? `<img class="crest-img" src="${CONFIG.logoAC}" alt="Acción Católica"
          onerror="this.outerHTML='&lt;svg class=&quot;crest&quot; viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;%23E8C04B&quot; stroke-width=&quot;1.4&quot;&gt;&lt;path d=&quot;M12 2 4 6v6c0 5 3.4 8.6 8 10 4.6-1.4 8-5 8-10V6l-8-4Z&quot;/&gt;&lt;path d=&quot;M12 7v9M8.5 11h7&quot; stroke-linecap=&quot;round&quot;/&gt;&lt;/svg&gt;'" />`
    : `<svg class="crest" viewBox="0 0 24 24" fill="none" stroke="#E8C04B" stroke-width="1.4">
         <path d="M12 2 4 6v6c0 5 3.4 8.6 8 10 4.6-1.4 8-5 8-10V6l-8-4Z"/>
         <path d="M12 7v9M8.5 11h7" stroke-linecap="round"/>
       </svg>`;

  const resumeBlock = resumeAvailable
    ? `<button class="btn btn-primary" id="resume">Continuar test</button>
       <button class="back" id="fresh" style="margin-top:14px;">Empezar de nuevo</button>`
    : `<button class="btn btn-primary" id="start">Empezar</button>`;

  app.innerHTML = `
    <div class="card intro">
      ${crest}
      <p class="eyebrow">Jóvenes de Acción Católica Mercedaria</p>
      <h1>¿Cuál es tu<br>ministerio?</h1>
      <p class="sub">Responde unas preguntas y descubre en qué ministerio del grupo encaja mejor tu forma de servir.</p>
      <div class="photo-strip">${fotos}</div>
      <p class="lema">"Libres para liberar"</p>
      ${resumeBlock}
    </div>`;

  const startBtn = document.getElementById('start');
  if (startBtn) startBtn.onclick = beginTest;

  const resumeBtn = document.getElementById('resume');
  if (resumeBtn) resumeBtn.onclick = () => {
    const data = loadProgress();
    if (data) { step = data.step; scores = data.scores; answers = data.answers; }
    startMusic();
    render();
  };

  const freshBtn = document.getElementById('fresh');
  if (freshBtn) freshBtn.onclick = () => {
    clearProgress();
    resumeAvailable = false;
    scores = { p:0, f:0, l:0, m:0, n:0 };
    answers = [];
    beginTest();
  };
}

function beginTest() {
  startMusic();
  step = 0;
  saveProgress();
  render();
}
function startMusic() {
  if (audioEl && !playing) { audioEl.play().catch(()=>{}); playing = true; musicBtn.innerHTML = ICON_PAUSE; }
}

function renderQuestion() {
  chainEl.hidden = false;
  updateChain();
  const item = QUESTIONS[step];
  app.innerHTML = `
    <div class="card">
      <p class="qcount">Pregunta ${step + 1} de ${QUESTIONS.length}</p>
      <h2 class="question">${item.q}</h2>
      <div class="options">
        ${item.opts.map((o, i) => `<button class="opt" data-i="${i}">${o.t}</button>`).join('')}
      </div>
      <button class="back" ${step === 0 ? 'hidden' : ''}>← Atrás</button>
    </div>`;
  app.querySelectorAll('.opt').forEach(btn => {
    btn.onclick = () => choose(parseInt(btn.dataset.i, 10));
  });
  const back = app.querySelector('.back');
  if (back) back.onclick = () => { step--; saveProgress(); render(); };
}

function choose(i) {
  if (answers[step] != null) applyScore(QUESTIONS[step].opts[answers[step]].s, -1);
  answers[step] = i;
  applyScore(QUESTIONS[step].opts[i].s, +1);
  step++;
  saveProgress();
  render();
}
function applyScore(s, sign) { for (const k in s) scores[k] += s[k] * sign; }

function winner() {
  const best = Object.keys(scores).reduce((a, b) => scores[b] > scores[a] ? b : a);
  const second = Object.keys(scores).filter(k => k !== best)
    .reduce((a, b) => scores[b] > scores[a] ? b : a);
  return { best, second };
}

function renderResult() {
  chainEl.hidden = false;
  step = QUESTIONS.length;
  updateChain();
  clearProgress();         // test completo: ya no hay nada que retomar
  const { best, second } = winner();
  const key = KEYMAP[best];
  const m = MINISTERIOS[key];
  const m2 = MINISTERIOS[KEYMAP[second]];
  const foto = CONFIG.fotosMinisterio[key];
  const fotoBlock = foto
    ? `<div class="result-photo"><img src="${foto}" alt="${m.nombre}" crossorigin="anonymous" /></div>`
    : `<div class="result-photo">FOTO DE ${m.nombre.toUpperCase()}</div>`;

  app.innerHTML = `
    <div class="card result">
      <div id="capture" class="capture">
        <div class="sello">
          <svg viewBox="0 0 24 24" fill="#E8C04B"><path d="${m.icon}"/></svg>
        </div>
        <p class="ledein">TU MINISTERIO ES</p>
        <h2>${m.nombre}</h2>
        ${fotoBlock}
        <p class="mision">${m.mision}</p>
        <div class="porque">${m.porque}</div>
        <p class="segundo">También encajarías en <b>${m2.nombre}</b>.</p>
        <p class="cap-lema">"Libres para liberar"</p>
        <p class="cap-tag">jacm.vkneider.dev</p>
      </div>
      <div class="actions">
        <button class="btn btn-primary" id="download">📸 Descargar imagen</button>
        <button class="btn btn-wa" id="whatsapp">Compartir por WhatsApp</button>
        <button class="btn btn-ghost" id="again">Hacer el test otra vez</button>
      </div>
      <p class="coord">Esto es solo una orientación — el último paso es el discernimiento personal y conversarlo con la coordinación.<br>
      Coordina <b>${m.nombre}</b>: ${m.coord}.</p>
    </div>`;

  document.getElementById('again').onclick = reset;
  document.getElementById('download').onclick = () => downloadImage(m);
  document.getElementById('whatsapp').onclick = () => shareWhatsApp(m);
}

// Genera la imagen del resultado con html2canvas.
async function captureResult() {
  const node = document.getElementById('capture');
  if (!node || typeof html2canvas !== 'function') return null;
  const canvas = await html2canvas(node, {
    backgroundColor: '#5C0A0A',
    scale: 2,                 // mayor resolución para compartir
    useCORS: true             // permite incluir las fotos del repo
  });
  return canvas;
}

// Botón principal: en móvil intenta compartir la imagen (WhatsApp/Instagram con foto);
// si no se puede, la descarga.
async function downloadImage(m) {
  const btn = document.getElementById('download');
  const prev = btn.textContent;
  btn.textContent = 'Generando…';
  btn.disabled = true;
  try {
    const canvas = await captureResult();
    if (!canvas) { showToast('No se pudo generar la imagen'); return; }

    const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
    const file = new File([blob], `mi-ministerio-${m.nombre.toLowerCase()}.png`, { type: 'image/png' });
    const text = `Mi ministerio en JACM es ${m.nombre}. "Libres para liberar". Descubre el tuyo:`;

    // Compartir nativo con imagen (móvil) — el SO ofrece WhatsApp, Instagram, etc.
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({ files: [file], text, url: location.href });
    } else {
      // Escritorio o sin soporte: descarga directa
      const a = document.createElement('a');
      a.href = canvas.toDataURL('image/png');
      a.download = file.name;
      a.click();
      showToast('Imagen descargada');
    }
  } catch (e) {
    showToast('No se pudo compartir');
  } finally {
    btn.textContent = prev;
    btn.disabled = false;
  }
}

// Respaldo universal: abre WhatsApp con texto + enlace (WhatsApp no acepta imágenes por URL).
function shareWhatsApp(m) {
  const text = `Hice el test de JACM y mi ministerio es ${m.nombre}. "Libres para liberar". Descubre el tuyo: ${location.href}`;
  window.open('https://wa.me/?text=' + encodeURIComponent(text), '_blank');
}
function showToast(msg) {
  const t = document.getElementById('toast');
  if (msg) t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1900);
}

function reset() {
  clearProgress();
  resumeAvailable = false;
  step = -1;
  scores = { p:0, f:0, l:0, m:0, n:0 };
  answers = [];
  render();
}

function render() {
  if (step === -1) renderIntro();
  else if (step < QUESTIONS.length) renderQuestion();
  else renderResult();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

setupAudio();
buildChain();
// ¿hay un test a medias guardado?
const saved = loadProgress();
if (saved && saved.step > 0 && saved.step < QUESTIONS.length) {
  resumeAvailable = true;
}
render();
</script>
